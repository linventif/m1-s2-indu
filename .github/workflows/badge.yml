name: Coverage Badge

on:
  push:
    branches-ignore:
      - main

jobs:
  badge:
    name: Badge
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Run all tests
        run: mvn -B clean verify

      - name: Generate coverage badge
        id: coverage
        run: bash ./.github/scripts/generate-coverage-badge.sh

      - name: Add coverage summary
        run: |
          echo "JaCoCo coverage: ${{ steps.coverage.outputs.percentage }}%" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            target/site/jacoco
            .github/badges/jacoco.svg

      - name: Commit coverage badge
        run: |
          if git diff --quiet -- .github/badges/jacoco.svg; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/badges/jacoco.svg
          git commit -m "chore: update coverage badge"
          git push
